// ═══════════════════════════════════════════════════════════════
//  SECURITY UTILITIES - Fix for crypto availability
// ═══════════════════════════════════════════════════════════════
function escapeHTML(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function generateSessionToken() {
  // Fallback if crypto is not available
  if (!window.crypto || !window.crypto.getRandomValues) {
    return Math.random().toString(36).substring(2, 15) + 
           Math.random().toString(36).substring(2, 15);
  }
  return Array.from(crypto.getRandomValues(new Uint8Array(32)))
    .map(b => b.toString(36).padStart(2, '0')).join('');
}

// PBKDF2 hash with fallback for older browsers
async function hashPassword(password, existingSaltB64 = null) {
  // Check if crypto.subtle is available
  if (!window.crypto || !window.crypto.subtle) {
    // Fallback to simple hash for older browsers (not recommended but better than nothing)
    console.warn('WebCrypto not available, using fallback hashing');
    let hash = 0;
    for (let i = 0; i < password.length; i++) {
      const char = password.charCodeAt(i);
      hash = ((hash << 5) - hash) + char;
      hash = hash & hash;
    }
    return `fallback:${hash.toString(36)}`;
  }

  try {
    const enc = new TextEncoder();
    const salt = existingSaltB64
      ? Uint8Array.from(atob(existingSaltB64), c => c.charCodeAt(0))
      : crypto.getRandomValues(new Uint8Array(16));

    const keyMaterial = await crypto.subtle.importKey(
      'raw', enc.encode(password), 'PBKDF2', false, ['deriveBits']
    );
    const bits = await crypto.subtle.deriveBits(
      { name: 'PBKDF2', hash: 'SHA-256', salt, iterations: 100000 },
      keyMaterial, 256
    );

    const hashB64 = btoa(String.fromCharCode(...new Uint8Array(bits)));
    const saltB64 = btoa(String.fromCharCode(...salt));
    return `v2:${saltB64}:${hashB64}`;
  } catch (e) {
    console.error('Hashing failed:', e);
    // Fallback
    return `fallback:${btoa(password).substring(0, 20)}`;
  }
}

// Legacy SHA-256 with fallback
async function legacySHA256(password) {
  if (!window.crypto || !window.crypto.subtle) {
    return password.split('').reduce((a, b) => {
      a = ((a << 5) - a) + b.charCodeAt(0);
      return a & a;
    }, 0).toString(36);
  }
  
  try {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(password));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  } catch (e) {
    return password.split('').reduce((a, b) => {
      a = ((a << 5) - a) + b.charCodeAt(0);
      return a & a;
    }, 0).toString(36);
  }
}

// Verify password with format detection
async function verifyPassword(password, storedHash) {
  if (!storedHash) return { matched: false, needsUpgrade: false };

  // Handle fallback hashes
  if (storedHash.startsWith('fallback:')) {
    const fallbackHash = await legacySHA256(password);
    return { 
      matched: fallbackHash === storedHash.replace('fallback:', ''),
      needsUpgrade: true 
    };
  }

  if (storedHash.startsWith('v2:')) {
    const parts = storedHash.split(':');
    if (parts.length !== 3) return { matched: false, needsUpgrade: false };
    const [, saltB64] = parts;
    const candidate = await hashPassword(password, saltB64);
    return { matched: candidate === storedHash, needsUpgrade: false };
  } else {
    const sha = await legacySHA256(password);
    return { matched: sha === storedHash, needsUpgrade: true };
  }
}

class ButtonState {
  constructor(btn) {
    this.btn = btn;
    this.originalText = btn.textContent;
  }
  
  loading(text = 'Saving...') {
    if (this.btn) {
      this.btn.disabled = true;
      this.btn.textContent = text;
    }
  }
  
  restore() {
    if (this.btn) {
      this.btn.disabled = false;
      this.btn.textContent = this.originalText;
    }
  }
}

let notifTimer;
function notify(msg, type = 'success') {
  const el = document.getElementById('notif');
  if (!el) return;
  
  el.textContent = msg;
  el.className = `notif ${type}`;
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'notifIn .35s cubic-bezier(.22,.68,0,1.2) forwards';
  el.style.display = 'block';
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => {
    el.style.animation = 'notifOut .3s ease forwards';
    setTimeout(() => { el.style.display = 'none'; }, 300);
  }, 3200);
}

// ═══════════════════════════════════════════════════════════════
//  CONFIRMATION MODAL
// ═══════════════════════════════════════════════════════════════
function showConfirm(title, message, onConfirm, onCancel = null) {
  const titleEl = document.getElementById('confirm-title');
  const msgEl = document.getElementById('confirm-message');
  const yesBtn = document.getElementById('confirm-yes');
  const cancelBtn = document.querySelector('[data-modal="modal-confirm"].btn-sec');
  
  if (!titleEl || !msgEl || !yesBtn) return;
  
  titleEl.textContent = title;
  msgEl.textContent = message;
  
  // Remove old handlers
  yesBtn.onclick = null;
  if (cancelBtn) cancelBtn.onclick = null;
  
  // Set new handlers
  yesBtn.onclick = () => {
    onConfirm();
    closeModal('modal-confirm');
  };
  
  if (onCancel && cancelBtn) {
    cancelBtn.onclick = () => {
      onCancel();
      closeModal('modal-confirm');
    };
  }
  
  openModal('modal-confirm');
}

// ═══════════════════════════════════════════════════════════════
//  BOOT SEQUENCE - Fixed error handling
// ═══════════════════════════════════════════════════════════════
let authRetryCount = 0;
const MAX_AUTH_RETRIES = 3;
let authInitialized = false;

window.addEventListener('DOMContentLoaded', () => {
  // Ensure we're in standards mode
  if (document.compatMode !== 'CSS1Compat') {
    console.warn('Page in quirks mode, forcing standards...');
    // Force reflow
    document.documentElement.style.display = 'none';
    document.documentElement.offsetHeight;
    document.documentElement.style.display = '';
  }
  
  setLoadingMsg('Connecting…');
  
  const retryBtn = document.getElementById('retry-auth');
  if (retryBtn) {
    retryBtn.onclick = () => {
      retryBtn.style.display = 'none';
      setLoadingMsg('Connecting…');
      authRetryCount = 0;
      firebase.auth().signInAnonymously().catch(handleAuthError);
    };
  }

  // Set auth state observer
  firebase.auth().onAuthStateChanged(async (fbUser) => {
    if (authInitialized) return;
    
    if (!fbUser) {
      try { 
        await firebase.auth().signInAnonymously(); 
      } catch(e) { 
        handleAuthError(e);
      }
      return;
    }

    try {
      setLoadingMsg('Loading workspace data…');
      
      // ALWAYS load all data first
      await loadUserData();
      await loadAdminData();
      
      // Check session expiry
      const saved = await loadSavedSession();
      if (saved && !isSessionExpired()) {
        S.currentUser = saved.user;
        S.isAdmin = saved.isAdmin;
        const liveEl = document.getElementById('sb-live');
        if (liveEl) liveEl.style.display = 'flex';
        initApp();
      } else {
        if (saved) clearSession();
        const liveEl = document.getElementById('sb-live');
        if (liveEl) liveEl.style.display = 'flex';
        showScreen('portal-screen');
      }
      
      authInitialized = true;
    } catch(e) {
      console.error('Boot sequence error:', e);
      setLoadingMsg('⚠ Load error: ' + e.message);
      if (retryBtn) retryBtn.style.display = 'block';
    }
  });
});

function handleAuthError(e) {
  console.error('Auth error:', e);
  setLoadingMsg('⚠ Auth error: ' + e.message);
  authRetryCount++;
  if (authRetryCount < MAX_AUTH_RETRIES) {
    setTimeout(() => {
      setLoadingMsg('Retrying connection...');
      firebase.auth().signInAnonymously().catch(handleAuthError);
    }, 2000);
  } else {
    const retryBtn = document.getElementById('retry-auth');
    if (retryBtn) retryBtn.style.display = 'block';
  }
}

function setLoadingMsg(msg) { 
  const el = document.getElementById('loading-msg');
  if (el) el.textContent = msg; 
}

// Check if session has expired
function isSessionExpired() {
  try {
    const raw = localStorage.getItem(SESSION_KEY + '_timestamp');
    if (!raw) return true;
    const timestamp = parseInt(raw);
    return Date.now() - timestamp > S.sessionTimeout;
  } catch(e) {
    return true;
  }
}

let resolved = false;
function loadUserData() {
  return new Promise((resolve, reject) => {
    if (!db) {
      reject(new Error('Firebase not initialized'));
      return;
    }
    
    let ready = {users: false, bookings: false, deptPasswords: false};
    
    db.ref('users').on('value', snap => {
      S.users = Object.entries(snap.val()||{}).map(([k,v])=>({...v,_key:k}));
      ready.users = true;
      checkReady();
    }, error => {
      console.error('Users listener error:', error);
    });
    
    db.ref('bookings').on('value', snap => {
      S.bookings = Object.entries(snap.val()||{}).map(([k,v])=>({...v,_key:k}));
      ready.bookings = true;
      checkReady();
    }, error => {
      console.error('Bookings listener error:', error);
    });
    
    db.ref('deptPasswords').on('value', snap => {
      S.deptPasswords = snap.val() || {};
      ready.deptPasswords = true;
      checkReady();
      if (resolved) refreshUI();
    }, error => {
      console.error('DeptPasswords listener error:', error);
    });
    
    function checkReady() {
      if (Object.values(ready).every(Boolean)) {
        resolved = true;
        refreshUI();
        resolve();
      }
    }
    
    setTimeout(() => reject(new Error('Database timed out')), 15000);
  });
}

function loadAdminData() {
  return new Promise((resolve) => {
    if (!db) {
      resolve();
      return;
    }
    
    db.ref('admins').on('value', snap => {
      S.admins = Object.entries(snap.val()||{}).map(([k,v])=>({...v,_key:k}));
      resolve();
    }, error => {
      console.error('Admins listener error:', error);
      resolve();
    });
  });
}

// ═══════════════════════════════════════════════════════════════
//  SESSION MANAGEMENT
// ═══════════════════════════════════════════════════════════════
const SESSION_KEY = 'equipDesk_session';

function saveSession(user, isAdmin) {
  try {
    localStorage.setItem(SESSION_KEY, JSON.stringify({ key: user._key, type: isAdmin ? 'admin' : 'user' }));
    localStorage.setItem(SESSION_KEY + '_timestamp', Date.now().toString());
  } catch(e) {
    console.warn('Could not save session:', e);
  }
}

function clearSession() {
  try { 
    localStorage.removeItem(SESSION_KEY);
    localStorage.removeItem(SESSION_KEY + '_timestamp');
  } catch(e) {}
}

async function loadSavedSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    const { key, type } = JSON.parse(raw);

    if (type === 'admin') {
      const admin = S.admins.find(a => a._key === key);
      return admin ? { user: {...admin, type:'admin'}, isAdmin: true } : null;
    } else {
      const user = S.users.find(u => u._key === key);
      return user ? { user: {...user, type:'user'}, isAdmin: false } : null;
    }
  } catch(e) { 
    clearSession(); 
    return null; 
  }
}

// ═══════════════════════════════════════════════════════════════
//  SCREEN MANAGEMENT
// ═══════════════════════════════════════════════════════════════
function showScreen(id, direction) {
  const current = document.querySelector('.screen.active');
  const next = document.getElementById(id);
  if (!next || next === current) return;

  if (current) {
    current.style.pointerEvents = 'none';
    const outClass = direction === 'back' ? 'slide-out-right' : 'slide-out-left';
    current.classList.add(outClass);
    setTimeout(() => {
      current.classList.remove('active', outClass);
      current.style.pointerEvents = '';
    }, 350);
  }

  const inClass = direction === 'back' ? 'slide-in-left' : (id === 'portal-screen' ? 'fade-up' : 'slide-in-right');
  next.classList.add('active', inClass);
  setTimeout(() => next.classList.remove(inClass), 500);
}

function storeCredential(id, password, name) {
  if (!window.PasswordCredential) return;
  try {
    const cred = new PasswordCredential({ id, password, name });
    navigator.credentials.store(cred).catch(() => {});
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════
//  ADMIN LOGIN
// ═══════════════════════════════════════════════════════════════
async function doAdminLogin(e) {
  e.preventDefault();

  const u = document.getElementById('admin-user')?.value.trim() || '';
  const p = document.getElementById('admin-pass')?.value.trim() || '';
  const errEl = document.getElementById('login-error');
  
  if (!errEl) return;
  errEl.classList.remove('visible');

  if (S.admins.length === 0) {
    try { await loadAdminData(); }
    catch(err) {
      errEl.textContent = 'Could not reach admin database. Check your connection.';
      errEl.classList.add('visible');
      return;
    }
  }

  let matchedAdmin = null;
  let needsUpgrade = false;

  for (const admin of S.admins) {
    if (admin.username !== u) continue;
    const result = await verifyPassword(p, admin.password);
    if (result.matched) {
      matchedAdmin = admin;
      needsUpgrade = result.needsUpgrade;
      break;
    }
  }

  if (!matchedAdmin) {
    errEl.textContent = 'Invalid username or password.';
    errEl.classList.add('visible');
    shakeBox('admin-login-screen');
    return;
  }

  if (needsUpgrade) {
    try {
      const newHash = await hashPassword(p);
      await db.ref('admins/' + matchedAdmin._key).update({ password: newHash });
      matchedAdmin.password = newHash;
      S.admins = S.admins.map(a => a._key === matchedAdmin._key ? { ...a, password: newHash } : a);
    } catch(err) {
      console.warn('Hash upgrade failed:', err.message);
    }
  }

  const fbUser = firebase.auth().currentUser;
  if (fbUser) {
    await db.ref(`activeSessions/${fbUser.uid}`).set({
      isAdmin: true,
      username: u,
      loginTime: Date.now(),
      sessionToken: generateSessionToken()
    });
  }

  storeCredential(u, p, matchedAdmin.name || 'Admin');
  S.currentUser = { ...matchedAdmin, type: 'admin' };
  S.isAdmin = true;
  S.initialized = true;
  saveSession(S.currentUser, true);
  initApp();
}

// ═══════════════════════════════════════════════════════════════
//  USER LOGIN
// ═══════════════════════════════════════════════════════════════
async function doUserLogin(e) {
  e.preventDefault();

  const email = document.getElementById('user-email-input')?.value.trim().toLowerCase() || '';
  const pass = document.getElementById('user-dept-pass-input')?.value.trim() || '';
  const errEl = document.getElementById('user-login-error');
  
  if (!errEl) return;
  errEl.classList.remove('visible');

  if (!email || !pass) {
    errEl.textContent = 'Please enter your email and department password.';
    errEl.classList.add('visible');
    return;
  }

  if (!isValidEmail(email)) {
    errEl.textContent = 'Please enter a valid email address.';
    errEl.classList.add('visible');
    return;
  }

  const user = S.users.find(u => (u.email || '').toLowerCase() === email);
  if (!user) {
    errEl.textContent = 'No account found with that email address.';
    errEl.classList.add('visible');
    shakeBox('user-login-screen');
    return;
  }

  const dept = user.department || '';
  const correctPassHash = S.deptPasswords[dept];

  if (!correctPassHash) {
    errEl.textContent = 'Your department does not have a password set. Contact your admin.';
    errEl.classList.add('visible');
    return;
  }

  const { matched, needsUpgrade } = await verifyPassword(pass, correctPassHash);

  if (!matched) {
    errEl.textContent = 'Incorrect department password. Please try again.';
    errEl.classList.add('visible');
    shakeBox('user-login-screen');
    return;
  }

  if (needsUpgrade) {
    try {
      const newHash = await hashPassword(pass);
      await db.ref('deptPasswords/' + dept).set(newHash);
      S.deptPasswords[dept] = newHash;
    } catch(err) {
      console.warn('Dept hash upgrade failed:', err.message);
    }
  }

  storeCredential(email, pass, user.name);
  S.currentUser = { ...user, type: 'user' };
  S.isAdmin = false;
  S.initialized = true;
  saveSession(S.currentUser, false);
  initApp();
}

function shakeBox(screenId) {
  const box = document.querySelector('#' + screenId + ' .modal-box');
  if (!box) return;
  box.classList.remove('shake');
  void box.offsetWidth;
  box.classList.add('shake');
  setTimeout(() => box.classList.remove('shake'), 400);
}

// ═══════════════════════════════════════════════════════════════
//  APP INIT
// ═══════════════════════════════════════════════════════════════
function initApp() {
  const u = S.currentUser;
  if (!u) return;
  
  const nameEl = document.getElementById('sb-name');
  const roleEl = document.getElementById('sb-role');
  const avatarEl = document.getElementById('sb-avatar');
  const navAdmin = document.getElementById('nav-admin');
  
  if (nameEl) nameEl.textContent = u.name;
  if (roleEl) roleEl.textContent = S.isAdmin ? 'Administrator' : (u.department || 'User');
  if (avatarEl) avatarEl.textContent = initials(u.name);

  if (S.isAdmin && navAdmin) {
    if (avatarEl) avatarEl.classList.add('admin-av');
    navAdmin.style.display = 'flex';
  }

  populateAttendeeDropdowns();

  document.querySelectorAll('.screen').forEach(s => { 
    s.classList.remove('active'); 
    s.style.display = ''; 
  });
  
  const appEl = document.getElementById('app');
  if (appEl) appEl.classList.add('active');

  if (S.isAdmin) switchPanel('admin');
  else switchPanel('calendar');

  notify('Welcome, ' + u.name.split(' ')[0] + ' ✓');
}

function doLogout() {
  clearSession();
  S.currentUser = null;
  S.isAdmin = false;
  S.initialized = false;
  
  const appEl = document.getElementById('app');
  const navAdmin = document.getElementById('nav-admin');
  const avatarEl = document.getElementById('sb-avatar');
  
  if (appEl) appEl.classList.remove('active');
  if (navAdmin) navAdmin.style.display = 'none';
  if (avatarEl) avatarEl.classList.remove('admin-av');
  
  showScreen('portal-screen', 'back');
  
  const fbUser = firebase.auth().currentUser;
  if (fbUser) {
    db.ref(`activeSessions/${fbUser.uid}`).remove()
      .catch(e => console.warn('Session cleanup failed:', e.message));
  }
}

// ═══════════════════════════════════════════════════════════════
//  PANEL SWITCHING
// ═══════════════════════════════════════════════════════════════
function switchPanel(panel) {
  const calEl = document.getElementById('panel-calendar');
  const adminEl = document.getElementById('panel-admin');
  
  if (!calEl || !adminEl) return;

  calEl.style.display = panel === 'calendar' ? 'flex' : 'none';
  if (panel === 'calendar') calEl.style.flexDirection = 'column';
  adminEl.style.display = panel === 'admin' ? 'flex' : 'none';

  const activePanel = panel === 'calendar' ? calEl : adminEl;
  activePanel.classList.add('panel-fade');
  setTimeout(() => activePanel.classList.remove('panel-fade'), 400);

  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  
  const navCalendar = document.getElementById('nav-calendar');
  const navAdmin = document.getElementById('nav-admin');
  
  if (panel === 'calendar' && navCalendar) navCalendar.classList.add('active');
  else if (navAdmin) navAdmin.classList.add('active');

  if (panel === 'calendar') renderCalendar();
  else renderAdminTab();
}

// ═══════════════════════════════════════════════════════════════
//  RESOURCE / VIEW / NAV
// ═══════════════════════════════════════════════════════════════
function switchResource(r) {
  S.resource = r;
  const tabBoard = document.getElementById('tab-boardroom');
  const tabCar = document.getElementById('tab-car');
  
  if (tabBoard) tabBoard.classList.toggle('active', r === 'boardroom');
  if (tabCar) tabCar.classList.toggle('active', r === 'car');
  
  renderCalendar();
}

function switchView(v) {
  S.view = v;
  document.querySelectorAll('.view-tab').forEach((btn, i) => {
    if (btn) btn.classList.toggle('active', ['day', 'week', 'month', 'year'][i] === v);
  });
  renderCalendar();
}

function navPrev() {
  const d = new Date(S.date);
  if (S.view === 'day') d.setDate(d.getDate() - 1);
  else if (S.view === 'week') d.setDate(d.getDate() - 7);
  else if (S.view === 'month') d.setMonth(d.getMonth() - 1);
  else if (S.view === 'year') d.setFullYear(d.getFullYear() - 1);
  S.date = d;
  renderCalendar();
}

function navNext() {
  const d = new Date(S.date);
  if (S.view === 'day') d.setDate(d.getDate() + 1);
  else if (S.view === 'week') d.setDate(d.getDate() + 7);
  else if (S.view === 'month') d.setMonth(d.getMonth() + 1);
  else if (S.view === 'year') d.setFullYear(d.getFullYear() + 1);
  S.date = d;
  renderCalendar();
}

function goToday() {
  S.date = new Date();
  document.querySelectorAll('.view-tab').forEach((btn, i) => {
    if (btn) btn.classList.toggle('active', ['day', 'week', 'month', 'year'][i] === S.view);
  });
  renderCalendar();
}

// ═══════════════════════════════════════════════════════════════
//  MODAL HELPERS
// ═══════════════════════════════════════════════════════════════
function openModal(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.display = 'flex';
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('open')));
}

function closeModal(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.remove('open');
  setTimeout(() => {
    if (!el.classList.contains('open')) el.style.display = 'none';
  }, 380);
}

// ═══════════════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════════════
function initials(name) {
  if (!name) return '?';
  return name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

// ═══════════════════════════════════════════════════════════════
//  EVENT LISTENERS
// ═══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  // Call ensureDefaultData after Firebase is ready
  setTimeout(() => {
    ensureDefaultData().catch(console.error);
  }, 1000);
  
  // Portal cards
  document.querySelectorAll('[data-portal]').forEach(card => {
    card.addEventListener('click', () => selectPortal(card.dataset.portal));
  });
  
  // Back buttons
  document.querySelectorAll('[data-screen]').forEach(btn => {
    btn.addEventListener('click', () => showScreen(btn.dataset.screen, btn.dataset.direction));
  });
  
  // Login forms
  const adminForm = document.getElementById('admin-login-form');
  const userForm = document.getElementById('user-login-form');
  
  if (adminForm) adminForm.addEventListener('submit', doAdminLogin);
  if (userForm) userForm.addEventListener('submit', doUserLogin);
  
  // Sign out
  const signoutBtn = document.getElementById('btn-signout');
  if (signoutBtn) signoutBtn.addEventListener('click', doLogout);
  
  // Navigation
  document.querySelectorAll('[data-panel]').forEach(btn => {
    btn.addEventListener('click', () => switchPanel(btn.dataset.panel));
  });
  
  document.querySelectorAll('[data-resource]').forEach(btn => {
    btn.addEventListener('click', () => switchResource(btn.dataset.resource));
  });
  
  document.querySelectorAll('[data-view]').forEach(btn => {
    btn.addEventListener('click', () => switchView(btn.dataset.view));
  });
  
  const prevBtn = document.getElementById('btn-prev');
  const nextBtn = document.getElementById('btn-next');
  const todayBtn = document.getElementById('btn-today');
  
  if (prevBtn) prevBtn.addEventListener('click', navPrev);
  if (nextBtn) nextBtn.addEventListener('click', navNext);
  if (todayBtn) todayBtn.addEventListener('click', goToday);
  
  // Admin tabs
  document.querySelectorAll('[data-admin-tab]').forEach(btn => {
    btn.addEventListener('click', () => showAdminTab(btn.dataset.adminTab));
  });
  
  // New booking button
  const newBookingBtn = document.getElementById('btn-new-booking');
  if (newBookingBtn) newBookingBtn.addEventListener('click', () => openBookModal(null, null));
  
  // Close modal buttons
  document.querySelectorAll('[data-modal]').forEach(btn => {
    btn.addEventListener('click', () => closeModal(btn.dataset.modal));
  });
  
  // Keyboard escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.overlay.open').forEach(o => closeModal(o.id));
    }
  });
  
  // Ripple effect
  document.addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    btn.classList.add('btn-ripple');
    btn.classList.remove('rippling');
    requestAnimationFrame(() => btn.classList.add('rippling'));
    setTimeout(() => btn.classList.remove('rippling', 'btn-ripple'), 550);
  });
});
